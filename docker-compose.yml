version: '3.8'

services:
  db:
    image: postgres:15-alpine
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d issuestracker" ]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: issuestracker
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    environment:
      - DB_HOST=db
      - DB_NAME=issuestracker
      - DB_USER=admin
      - DB_PASS=password123
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
